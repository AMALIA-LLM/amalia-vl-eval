# CARAVELA — Reasoning leaf task
task: "caravela_reasoning"
tag:
  - caravela
include: _default_template_yaml
dataset_kwargs:
  token: True
  data_files:
    test: caravela_reasoning.parquet
test_split: test
doc_to_text: !function utils.caravela_reasoning_doc_to_text
generation_kwargs:
  max_new_tokens: 2048
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.caravela_reasoning_process_results
metric_list:
  - metric: caravela_score
    aggregation: !function utils.caravela_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nExplica o teu raciocínio passo a passo. Termina a tua resposta escrevendo 'ANSWER:' seguido da tua conclusão."
