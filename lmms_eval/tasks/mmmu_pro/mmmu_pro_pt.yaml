task: "mmmu_pro_pt"
tag:
  - amalia_vl_eval_pt
dataset_path: amalia-llm/MMMU-Pro-PT
dataset_kwargs:
  token: True
test_split: test
output_type: generate_until
doc_to_visual: !function utils.mmmu_pro_doc_to_visual
doc_to_text: !function utils.mmmu_pro_doc_to_text
doc_to_target: "{{answer}}"
process_results: !function utils.mmmu_pro_process_results

metric_list:
  - metric: mmmu_acc
    aggregation: !function utils.mmmu_pro_aggregate_results
    higher_is_better: true

include: _default_template_yaml

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "Responda diretamente com a letra da opção entre as escolhas fornecidas."
