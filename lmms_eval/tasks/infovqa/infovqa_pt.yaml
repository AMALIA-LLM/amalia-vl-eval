dataset_path: amalia-llm/InfographicVQA-PT
dataset_kwargs:
  token: True
task: "infovqa_pt"
tag:
  - amalia_vl_eval_pt
test_split: validation
output_type: generate_until
doc_to_visual: !function utils_pt.infovqa_doc_to_visual
doc_to_text: !function utils_pt.infovqa_doc_to_text
doc_to_target: "answers"
generation_kwargs:
  max_new_tokens: 32
  temperature: 0
  do_sample: False
process_results: !function utils_pt.infovqa_process_results
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nResponde à pergunta utilizando uma palavra ou frase."
metric_list:
  - metric: anls
    aggregation: mean
    higher_is_better: true
