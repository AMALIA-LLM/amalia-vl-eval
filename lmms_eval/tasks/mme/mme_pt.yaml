dataset_path: amalia-llm/MME-PT
task: "mme_pt"
tag:
  - amalia_vl_eval_pt
dataset_kwargs:
  token: True
test_split: test
output_type: generate_until
doc_to_visual: !function utils_pt.mme_doc_to_visual
doc_to_text: !function utils_pt.mme_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils_pt.mme_process_results
metric_list:
  - metric: mme_perception_score
    aggregation: !function utils_pt.mme_aggregate_results
    higher_is_better: true
  - metric: mme_cognition_score
    aggregation: !function utils_pt.mme_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nResponde à pergunta utilizando uma palavra ou frase."
  plm:
    pre_prompt: ""
    post_prompt: ""
metadata:
  - version: 0.0
