dataset_path: amalia-llm/RealWorldQA-PT
dataset_kwargs:
  token: True
task: "realworldqa_pt"
tag:
  - amalia_vl_eval_pt
test_split: test
output_type: generate_until
doc_to_visual: !function utils.realworldqa_doc_to_visual
doc_to_text: !function utils.realworldqa_doc_to_text
doc_to_target: "answer"

generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false

process_results: !function utils.realworldqa_process_results

metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""

metadata:
  - version: 0.0
