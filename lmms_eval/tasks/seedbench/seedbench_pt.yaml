dataset_path: amalia-llm/SEED-Bench-PT
dataset_kwargs:
  token: True
task: "seedbench_pt"
tag:
  - amalia_vl_eval_pt
test_split: test
output_type: generate_until
doc_to_visual: !function utils_pt.seed_doc_to_visual
doc_to_text: !function utils_pt.seed_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  until:
    - "ASSISTANT:"
  image_aspect_ratio: original
process_results: !function utils_pt.seed_process_result
metric_list:
  - metric: seed_image
    aggregation: !function utils_pt.seed_aggregation_result
    higher_is_better: true
  - metric: seed_video
    aggregation: !function utils_pt.seed_aggregation_result
    higher_is_better: true
  - metric: seed_all
    aggregation: !function utils_pt.seed_aggregation_result
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    post_prompt: "\nResponde diretamente com a letra da opção das opções disponíveis."
    mc_prompt: " Resposta :"

metadata:
  - version: 0.0
