dataset_path: amalia-llm/AI2D-PT
task: "ai2d_pt"
tag:
  - amalia_vl_eval_pt
dataset_kwargs:
  token: True
test_split: test
output_type: generate_until
doc_to_visual: !function utils_pt.ai2d_doc_to_visual
doc_to_text: !function utils_pt.ai2d_doc_to_text
doc_to_target: !function utils_pt.ai2d_doc_to_target

lmms_eval_specific_kwargs:
  default:
    prompt_format: mcq
    pre_prompt: ""
    post_prompt: "\nResponda diretamente com a letra da opção entre as escolhas fornecidas."

model_specific_target_kwargs:
  default: "mcq"
  qwen_vl: "qa"

generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  do_sample: False

filter_list:
  - name: "flexible-extract"
    filter:
      - function: !function utils_pt.MultiChoiceRegexFilter
        group_select: 0
        ignore_case: true
        ignore_punctuation: true
        regex_pattern: "([A-Z])\\."

metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true

metadata:
  - version: 0.0
